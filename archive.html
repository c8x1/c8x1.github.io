<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史归档 | c8x1 · Daily Curated</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; }
        a { text-decoration: none; color: inherit; }

        /* Header */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: #fff; }
        .logo span { color: var(--accent-blue); font-weight: 400; }
        .header-date { font-size: 0.9rem; color: var(--text-secondary); }

        /* Hero */
        .hero { text-align: center; padding: 3rem 0 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .hero h1 { font-size: 2rem; font-weight: 500; }

        /* Trending Compact Grid */
        .trending-compact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        .trending-compact {
            display: flex; align-items: center; gap: 0.6rem;
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px;
            padding: 0.55rem 0.85rem; transition: border-color 0.2s;
            color: inherit; text-decoration: none; overflow: hidden; min-width: 0;
        }
        .trending-compact:hover { border-color: var(--accent-green); }
        .tc-rank { font-size: 0.8rem; font-weight: 700; color: var(--accent-green); flex-shrink: 0; width: 18px; text-align: center; }
        .tc-info { flex: 1; min-width: 0; overflow: hidden; }
        .tc-repo { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 0.8rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tc-desc { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .tc-stats { display: flex; gap: 0.6rem; font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
        .tc-stats .today { color: var(--accent-green); }

        /* Monthly grouping */
        .month-header { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 2.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .month-header:first-child { margin-top: 0; }

        /* Day block (trending) */
        .day-block { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
        .day-date { font-size: 0.95rem; font-weight: 600; color: #fff; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .day-count { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }

        /* Load more button */
        .load-more-container { text-align: center; margin: 2.5rem 0; }
        .load-more { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.6rem 2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: 'Noto Sans SC', sans-serif; transition: border-color 0.2s, color 0.2s; }
        .load-more:hover { border-color: var(--accent-blue); color: var(--text); }

        /* Loading state */
        .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }

        /* Tab switcher */
        .tab-bar { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 0.75rem 1.5rem; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: color 0.2s, border-color 0.2s; }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active { color: #fff; border-bottom-color: var(--accent-blue); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ---- Articles Tab: Compact Grid ---- */
        .articles-toolbar {
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .articles-search {
            flex: 1; min-width: 200px; max-width: 400px;
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.55rem 1rem; color: var(--text); font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif; outline: none;
            transition: border-color 0.2s;
        }
        .articles-search:focus { border-color: var(--accent-blue); }
        .articles-search::placeholder { color: var(--text-muted); }
        .cat-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .cat-btn {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
            padding: 0.3rem 0.85rem; font-size: 0.78rem; color: var(--text-secondary);
            cursor: pointer; font-family: 'Noto Sans SC', sans-serif; white-space: nowrap;
            transition: all 0.2s;
        }
        .cat-btn:hover { border-color: var(--accent-blue); color: var(--text); }
        .cat-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .articles-count { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }

        .articles-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem;
        }
        .article-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 1rem 1.1rem; transition: border-color 0.2s; display: flex; flex-direction: column;
            text-decoration: none; color: inherit;
        }
        .article-card:hover { border-color: var(--accent-blue); }
        .article-card-title {
            font-size: 0.88rem; font-weight: 500; color: var(--text); line-height: 1.5;
            margin-bottom: 0.5rem; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .article-card-meta {
            display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
            font-size: 0.72rem; color: var(--text-muted);
        }
        .article-card-tag {
            background: rgba(59,130,246,0.12); color: var(--accent-blue);
            padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.68rem;
        }
        .article-card-source { margin-left: auto; }
        .no-results { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.95rem; }

        /* Footer */
        footer { background: var(--card-bg); border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; margin-top: 4rem; }
        footer p { font-size: 0.9rem; color: var(--text-muted); }

        /* Responsive */
        @media (min-width: 768px) and (max-width: 1023px) {
            .trending-compact-grid { grid-template-columns: 1fr; }
            .articles-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 767px) {
            .container { padding: 0 1rem; }
            .hero h1 { font-size: 1.4rem; }
            .trending-compact-grid { grid-template-columns: 1fr; }
            .articles-grid { grid-template-columns: 1fr; }
            .articles-toolbar { flex-direction: column; align-items: stretch; }
            .articles-search { max-width: none; }
            .articles-count { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">c8x1<span> &middot; Daily Curated</span></a>
                <div class="header-date" id="current-date"></div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="hero">
                <h1>历史归档</h1>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="trending">🔥 GitHub Trending</button>
                <button class="tab-btn" data-tab="articles">📰 每日精选</button>
            </div>
            <div class="tab-panel active" id="panel-trending">
                <div id="trending-container"></div>
                <div class="load-more-container" id="trending-load-more-container" style="display:none;">
                    <button class="load-more" id="trending-load-more">加载更多</button>
                </div>
            </div>
            <div class="tab-panel" id="panel-articles">
                <div class="articles-toolbar" id="articles-toolbar">
                    <input type="text" class="articles-search" id="articles-search" placeholder="搜索文章标题、作者...">
                    <div class="cat-filters" id="cat-filters"></div>
                    <span class="articles-count" id="articles-count"></span>
                </div>
                <div class="articles-grid" id="articles-grid"></div>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 c8x1 &middot; Daily Curated</p>
        </div>
    </footer>
    <script>
// === Date display ===
document.getElementById('current-date').textContent = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

// === Trending Tab (unchanged) ===
var trendingState = { currentMonth: null, loading: false, loaded: false, container: null, loadMoreContainer: null };
var earliestMonth = null;
var now = new Date();
var startYear = now.getFullYear();
var startMonth = now.getMonth() + 1;

trendingState.container = document.getElementById('trending-container');
trendingState.loadMoreContainer = document.getElementById('trending-load-more-container');

function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatDateCN(dateStr) { var p = dateStr.split('-'); return parseInt(p[1]) + '\u6708' + parseInt(p[2]) + '\u65E5'; }
function getMonthKey(dateStr) { return dateStr.substring(0, 7); }
function formatMonthCN(mk) { var p = mk.split('-'); return p[0] + '\u5E74' + parseInt(p[1]) + '\u6708'; }
function monthKeyToString(y, m) { return y + '-' + (m < 10 ? '0' : '') + m; }
function prevMonth(y, m) { m--; if (m < 1) { m = 12; y--; } return [y, m]; }

function renderTrendingDay(data) {
    if (!data.trending || !data.trending.length) return null;
    var block = document.createElement('div'); block.className = 'day-block';
    var dateDiv = document.createElement('div'); dateDiv.className = 'day-date';
    dateDiv.innerHTML = esc(formatDateCN(data.date)) + ' <span class="day-count">(' + data.trending.length + ' trending)</span>';
    block.appendChild(dateDiv);
    var grid = document.createElement('div'); grid.className = 'trending-compact-grid';
    data.trending.forEach(function(item) {
        var card = document.createElement('a'); card.className = 'trending-compact';
        card.href = item.url || ('https://github.com/' + item.repo); card.target = '_blank';
        card.innerHTML = '<span class="tc-rank">' + esc(item.rank || '') + '</span>' +
            '<div class="tc-info"><div class="tc-repo">' + esc(item.repo) + '</div>' +
            '<div class="tc-desc">' + esc(item.desc) + '</div></div>' +
            '<div class="tc-stats"><span>&#9733; ' + esc(item.stars) + '</span>' +
            '<span class="today">+' + esc(item.todayStars) + '</span></div>';
        grid.appendChild(card);
    });
    block.appendChild(grid);
    return block;
}

function loadTrendingMonth() {
    var s = trendingState;
    if (s.loading) return;
    var y, m;
    if (!s.currentMonth) { y = startYear; m = startMonth; }
    else { var prev = prevMonth(s.currentMonth[0], s.currentMonth[1]); y = prev[0]; m = prev[1]; }
    if (earliestMonth) { var cur = monthKeyToString(y, m); if (cur < earliestMonth) { s.loadMoreContainer.style.display = 'none'; return; } }
    var monthKey = monthKeyToString(y, m);
    s.loading = true;
    var loadingDiv = document.createElement('div'); loadingDiv.className = 'loading'; loadingDiv.textContent = '\u52A0\u8F7D\u4E2D...';
    s.container.appendChild(loadingDiv);
    fetch('data/month-' + monthKey + '.json')
        .then(function(r) { if (r.status === 404) return []; return r.json(); })
        .then(function(days) {
            if (s.container.contains(loadingDiv)) s.container.removeChild(loadingDiv);
            s.loading = false;
            var hasContent = false;
            days.forEach(function(d) { if (d.trending && d.trending.length) hasContent = true; });
            if (hasContent) {
                var mh = document.createElement('div'); mh.className = 'month-header'; mh.textContent = formatMonthCN(monthKey);
                s.container.appendChild(mh);
            }
            days.forEach(function(d) { var b = renderTrendingDay(d); if (b) s.container.appendChild(b); });
            s.currentMonth = [y, m]; s.loaded = true;
            if (!hasContent && (!earliestMonth || monthKeyToString(y, m) > earliestMonth)) { loadTrendingMonth(); return; }
            s.loadMoreContainer.style.display = (earliestMonth && monthKeyToString(y, m) <= earliestMonth) ? 'none' : 'block';
        })
        .catch(function() { if (s.container.contains(loadingDiv)) s.container.removeChild(loadingDiv); s.loading = false; });
}

// === Articles Tab: Load from articles.json ===
var allArticles = [];
var activeCategory = null;
var searchQuery = '';

function getTopCategories(articles) {
    var counts = {};
    articles.forEach(function(a) { (a.category || []).forEach(function(c) { counts[c] = (counts[c] || 0) + 1; }); });
    return Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 10).map(function(e) { return e[0]; });
}

function renderArticles() {
    var filtered = allArticles;
    if (activeCategory) {
        filtered = filtered.filter(function(a) { return (a.category || []).indexOf(activeCategory) !== -1; });
    }
    if (searchQuery) {
        var q = searchQuery.toLowerCase();
        filtered = filtered.filter(function(a) {
            return (a.title || '').toLowerCase().indexOf(q) !== -1 ||
                   (a.author || '').toLowerCase().indexOf(q) !== -1 ||
                   (a.summary || '').toLowerCase().indexOf(q) !== -1 ||
                   (a.category || []).join(' ').toLowerCase().indexOf(q) !== -1;
        });
    }
    var grid = document.getElementById('articles-grid');
    grid.innerHTML = '';
    document.getElementById('articles-count').textContent = filtered.length + ' / ' + allArticles.length + ' \u7BC7';
    if (!filtered.length) {
        grid.innerHTML = '<div class="no-results">\u6CA1\u6709\u5339\u914D\u7684\u6587\u7AE0</div>';
        return;
    }
    filtered.forEach(function(a) {
        var card = document.createElement('a');
        card.className = 'article-card';
        card.href = a.file || ('articles/' + a.id + '.html');
        var tags = (a.category || []).slice(0, 2).map(function(c) {
            return '<span class="article-card-tag">' + esc(c) + '</span>';
        }).join('');
        card.innerHTML =
            '<div class="article-card-title">' + esc(a.title) + '</div>' +
            '<div class="article-card-meta">' +
                tags +
                '<span>' + esc(a.author) + '</span>' +
                '<span class="article-card-source">' + esc(a.source) + '</span>' +
            '</div>';
        grid.appendChild(card);
    });
}

function initArticlesTab(data) {
    allArticles = data.articles || [];
    // Build category filter buttons
    var cats = getTopCategories(allArticles);
    var container = document.getElementById('cat-filters');
    // "All" button
    var allBtn = document.createElement('button');
    allBtn.className = 'cat-btn active';
    allBtn.textContent = '\u5168\u90E8';
    allBtn.addEventListener('click', function() {
        activeCategory = null;
        document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
        allBtn.classList.add('active');
        renderArticles();
    });
    container.appendChild(allBtn);
    cats.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.textContent = cat;
        btn.addEventListener('click', function() {
            activeCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            renderArticles();
        });
        container.appendChild(btn);
    });
    // Search
    document.getElementById('articles-search').addEventListener('input', function(e) {
        searchQuery = e.target.value.trim();
        renderArticles();
    });
    renderArticles();
}

// === Tab switching ===
var tabBtns = document.querySelectorAll('.tab-btn');
tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
        tabBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var tab = btn.getAttribute('data-tab');
        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById('panel-' + tab).classList.add('active');
        if (tab === 'trending' && !trendingState.loaded) loadTrendingMonth();
        if (tab === 'articles' && !allArticles.length) loadArticlesData();
    });
});

function loadArticlesData() {
    fetch('articles.json').then(function(r) { return r.json(); }).then(initArticlesTab).catch(function() {
        document.getElementById('articles-grid').innerHTML = '<div class="no-results">\u52A0\u8F7D\u5931\u8D25</div>';
    });
}

// === Hash-based tab activation ===
function activateTabFromHash() {
    var hash = window.location.hash.replace('#', '');
    if (hash === 'articles') { tabBtns[1].click(); } else { tabBtns[0].click(); }
}

// === Initialize ===
fetch('data/index.json')
    .then(function(r) { return r.json(); })
    .then(function(dates) {
        if (dates.length > 0) earliestMonth = getMonthKey(dates[dates.length - 1]);
        activateTabFromHash();
    })
    .catch(function() { earliestMonth = null; activateTabFromHash(); });

document.getElementById('trending-load-more').addEventListener('click', loadTrendingMonth);
window.addEventListener('hashchange', activateTabFromHash);
    </script>
</body>
</html>
