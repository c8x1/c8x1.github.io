<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史归档 | c8x1 · Daily Curated</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
        }
        [data-theme="light"] {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-green: #16a34a;
            --accent-cyan: #0891b2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; transition: background 0.3s, color 0.3s; }
        a { text-decoration: none; color: inherit; }

        /* Header */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: #fff; }
        [data-theme="light"] .logo { color: #0f172a; }
        .logo span { color: var(--accent-blue); font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .header-date { font-size: 0.9rem; color: var(--text-secondary); }

        /* Theme toggle */
        .theme-toggle {
            background: none; border: 1px solid var(--border); border-radius: 8px;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; transition: border-color 0.2s;
            color: var(--text-secondary);
        }
        .theme-toggle:hover { border-color: var(--accent-blue); }

        /* Back link */
        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent-blue); }

        /* Hero */
        .hero { text-align: center; padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .hero h1 { font-size: 2rem; font-weight: 500; color: var(--text); }
        .hero-stats { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }

        /* Search */
        .search-bar {
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
        }
        .search-input {
            flex: 1; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.9rem;
            color: var(--text); font-family: 'Noto Sans SC', sans-serif;
            outline: none; transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent-blue); }

        /* Category filters */
        .category-filters {
            display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem;
        }
        .cat-btn {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
            padding: 0.3rem 0.9rem; font-size: 0.8rem; color: var(--text-secondary);
            cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s; white-space: nowrap;
        }
        .cat-btn:hover { border-color: var(--accent-blue); color: var(--text); }
        .cat-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

        /* Month grouping */
        .month-header {
            font-size: 1.1rem; font-weight: 700; color: var(--text);
            margin: 2rem 0 0.75rem; padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .month-header:first-child { margin-top: 0; }

        /* Article card */
        .article-card {
            display: flex; gap: 1rem; padding: 1rem; margin-bottom: 0.5rem;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; transition: border-color 0.2s; cursor: pointer;
        }
        .article-card:hover { border-color: var(--accent-blue); }
        .article-card:hover .article-title { color: var(--accent-blue); }
        .card-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 0.15rem; }
        .card-body { flex: 1; min-width: 0; }
        .article-title {
            font-size: 0.95rem; font-weight: 600; color: var(--text);
            transition: color 0.2s; line-height: 1.5;
        }
        .article-excerpt {
            font-size: 0.82rem; color: var(--text-secondary); margin-top: 0.3rem;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            line-height: 1.6;
        }
        .card-meta {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
            margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-muted);
        }
        .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .card-tag {
            background: var(--border); border-radius: 4px; padding: 0.1rem 0.45rem;
            font-size: 0.7rem; color: var(--text-secondary);
        }
        .card-tag:first-child { background: var(--accent-blue); color: #fff; }
        .card-read-time { color: var(--accent-cyan); }

        /* Pagination */
        .pagination {
            display: flex; justify-content: center; align-items: center; gap: 1rem;
            margin: 2.5rem 0;
        }
        .page-btn {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.5rem 1.2rem; font-size: 0.9rem; color: var(--text-secondary);
            cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--accent-blue); color: var(--text); }
        .page-btn:disabled { opacity: 0.4; cursor: default; }
        .page-info { font-size: 0.85rem; color: var(--text-muted); }

        /* No results */
        .no-results { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.95rem; }

        /* Loading */
        .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }

        /* Footer */
        footer {
            background: var(--card-bg); border-top: 1px solid var(--border);
            padding: 2rem 0; text-align: center; margin-top: 4rem;
        }
        footer p { font-size: 0.9rem; color: var(--text-muted); }

        @media (max-width: 767px) {
            .container { padding: 0 1rem; }
            .hero h1 { font-size: 1.4rem; }
            .article-card { flex-direction: column; gap: 0.5rem; }
            .card-icon { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">c8x1<span> &middot; Daily Curated</span></a>
                <div class="header-right">
                    <div class="header-date" id="current-date"></div>
                    <button class="theme-toggle" id="theme-toggle" title="切换主题"></button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <a href="index.html" class="back-link">&larr; 返回首页</a>
            <div class="hero">
                <h1>历史归档</h1>
                <div class="hero-stats" id="hero-stats"></div>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" id="search-input" placeholder="搜索文章标题或摘要...">
            </div>
            <div class="category-filters" id="category-filters"></div>
            <div id="articles-container"></div>
            <div class="pagination" id="pagination" style="display:none;">
                <button class="page-btn" id="prev-btn">&larr; 上一页</button>
                <span class="page-info" id="page-info"></span>
                <button class="page-btn" id="next-btn">下一页 &rarr;</button>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 c8x1 &middot; Daily Curated</p>
        </div>
    </footer>
    <script>
(function() {
    var PER_PAGE = 20;
    var allArticles = [];
    var filteredArticles = [];
    var currentPage = 1;
    var currentCategory = 'all';
    var searchQuery = '';
    var articleMap = {};

    // --- Theme toggle ---
    var themeBtn = document.getElementById('theme-toggle');
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        themeBtn.textContent = theme === 'light' ? '\u263E' : '\u2600';
    }
    applyTheme(localStorage.getItem('theme') || 'dark');
    themeBtn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
    });

    // --- Date display ---
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('zh-CN', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });

    // --- Search ---
    var searchInput = document.getElementById('search-input');
    var searchTimer = null;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            searchQuery = searchInput.value.trim().toLowerCase();
            currentPage = 1;
            applyFilters();
        }, 250);
    });

    // --- Category filters ---
    var catContainer = document.getElementById('category-filters');

    function renderCategories() {
        var catCounts = {};
        allArticles.forEach(function(a) {
            var cats = a.category || [];
            cats.forEach(function(c) {
                catCounts[c] = (catCounts[c] || 0) + 1;
            });
        });
        // Pick top 12 categories
        var sorted = Object.keys(catCounts).sort(function(a, b) { return catCounts[b] - catCounts[a]; });
        var topCats = sorted.slice(0, 12);

        catContainer.innerHTML = '';
        // "All" button
        var allBtn = document.createElement('button');
        allBtn.className = 'cat-btn' + (currentCategory === 'all' ? ' active' : '');
        allBtn.textContent = '\u5168\u90E8 (' + allArticles.length + ')';
        allBtn.addEventListener('click', function() {
            currentCategory = 'all'; currentPage = 1; applyFilters();
        });
        catContainer.appendChild(allBtn);

        topCats.forEach(function(cat) {
            var btn = document.createElement('button');
            btn.className = 'cat-btn' + (currentCategory === cat ? ' active' : '');
            btn.textContent = cat + ' (' + catCounts[cat] + ')';
            btn.addEventListener('click', function() {
                currentCategory = cat; currentPage = 1; applyFilters();
            });
            catContainer.appendChild(btn);
        });
    }

    // --- Filtering ---
    function applyFilters() {
        filteredArticles = allArticles.filter(function(a) {
            // Category filter
            if (currentCategory !== 'all') {
                var cats = a.category || [];
                if (cats.indexOf(currentCategory) === -1) return false;
            }
            // Search filter
            if (searchQuery) {
                var title = (a.title || '').toLowerCase();
                var subtitle = (a.subtitle || '').toLowerCase();
                var summary = (a.summary || a.excerpt || '').toLowerCase();
                if (title.indexOf(searchQuery) === -1 &&
                    subtitle.indexOf(searchQuery) === -1 &&
                    summary.indexOf(searchQuery) === -1) return false;
            }
            return true;
        });
        renderCategories();
        renderPage();
    }

    // --- Rendering ---
    function formatMonthCN(dateStr) {
        var parts = dateStr.substring(0, 7).split('-');
        return parts[0] + '\u5E74' + parseInt(parts[1]) + '\u6708';
    }

    function renderPage() {
        var container = document.getElementById('articles-container');
        container.innerHTML = '';

        var totalPages = Math.ceil(filteredArticles.length / PER_PAGE) || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        var start = (currentPage - 1) * PER_PAGE;
        var pageItems = filteredArticles.slice(start, start + PER_PAGE);

        if (pageItems.length === 0) {
            container.innerHTML = '<div class="no-results">\u6CA1\u6709\u627E\u5230\u5339\u914D\u7684\u6587\u7AE0</div>';
            document.getElementById('pagination').style.display = 'none';
            return;
        }

        var currentMonth = null;
        pageItems.forEach(function(a) {
            var mKey = a.date ? a.date.substring(0, 7) : '';
            if (mKey && mKey !== currentMonth) {
                var mh = document.createElement('div');
                mh.className = 'month-header';
                mh.textContent = formatMonthCN(mKey);
                container.appendChild(mh);
                currentMonth = mKey;
            }

            var card = document.createElement('a');
            card.className = 'article-card';
            card.href = a.url || ('articles/' + a.id + '.html');

            var tags = '';
            var cats = (a.category || []).slice(0, 3);
            cats.forEach(function(c) { tags += '<span class="card-tag">' + c + '</span>'; });

            var meta = '<span>' + (a.date || '') + '</span>';
            if (a.author) meta += '<span>&middot; ' + a.author + '</span>';
            var rt = a.stats ? a.stats.readTime : a.readTime;
            if (rt) meta += '<span class="card-read-time">' + rt + ' min</span>';

            var excerpt = a.summary || a.excerpt || '';

            card.innerHTML =
                '<span class="card-icon">' + (a.icon || '\uD83D\uDCF0') + '</span>' +
                '<div class="card-body">' +
                    '<div class="article-title">' + (a.title || '') + '</div>' +
                    (excerpt ? '<div class="article-excerpt">' + excerpt + '</div>' : '') +
                    '<div class="card-meta"><div class="card-tags">' + tags + '</div>' + meta + '</div>' +
                '</div>';

            container.appendChild(card);
        });

        // Pagination
        var pagDiv = document.getElementById('pagination');
        if (totalPages > 1) {
            pagDiv.style.display = 'flex';
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
            document.getElementById('page-info').textContent =
                currentPage + ' / ' + totalPages + ' \u9875 (' + filteredArticles.length + ' \u7BC7)';
        } else {
            pagDiv.style.display = 'none';
        }
    }

    // --- Pagination buttons ---
    document.getElementById('prev-btn').addEventListener('click', function() {
        if (currentPage > 1) { currentPage--; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    document.getElementById('next-btn').addEventListener('click', function() {
        var totalPages = Math.ceil(filteredArticles.length / PER_PAGE);
        if (currentPage < totalPages) { currentPage++; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });

    // --- Normalize article from articles.json ---
    function normalizeFromJSON(a) {
        return {
            id: a.id,
            title: a.title,
            subtitle: a.subtitle || '',
            summary: a.summary || '',
            category: a.category || a.tags || [],
            author: a.author || '',
            date: a.date || '',
            readTime: a.stats ? a.stats.readTime : 0,
            url: a.file || ('articles/' + a.id + '.html'),
            icon: '\uD83D\uDCF0',
            source: 'json'
        };
    }

    // --- Normalize article from data/*.json ---
    function normalizeFromData(a, dateStr) {
        return {
            id: a.id,
            title: a.title,
            subtitle: '',
            summary: a.excerpt || '',
            category: a.category ? a.category.split(' \u00B7 ') : [],
            author: a.author || '',
            date: dateStr,
            readTime: a.readTime || 0,
            url: a.url || (dateStr + '/' + a.id + '.html'),
            icon: a.icon || '\uD83D\uDCF0',
            source: 'data'
        };
    }

    // --- Load all data ---
    function loadData() {
        var container = document.getElementById('articles-container');
        container.innerHTML = '<div class="loading">\u52A0\u8F7D\u4E2D...</div>';

        // 1) Load articles.json (72 articles with full metadata)
        var p1 = fetch('articles.json').then(function(r) { return r.json(); }).then(function(d) {
            return (d.articles || []).map(normalizeFromJSON);
        }).catch(function() { return []; });

        // 2) Load data/index.json for date list
        var p2 = fetch('data/index.json').then(function(r) { return r.json(); }).catch(function() { return []; });

        Promise.all([p1, p2]).then(function(results) {
            var jsonArticles = results[0];
            var dates = results[1];

            // Deduplicate: articles.json is the source of truth
            jsonArticles.forEach(function(a) { articleMap[a.id] = a; });

            // 3) Fetch each data file for any additional articles
            if (dates.length === 0) {
                finishLoad();
                return;
            }

            var dataPromises = dates.map(function(dateStr) {
                return fetch('data/' + dateStr + '.json')
                    .then(function(r) { return r.json(); })
                    .then(function(d) { return { data: d, date: dateStr }; })
                    .catch(function() { return null; });
            });

            Promise.all(dataPromises).then(function(dataResults) {
                dataResults.forEach(function(item) {
                    if (!item) return;
                    var articles = item.data.articles || [];
                    articles.forEach(function(a) {
                        if (!articleMap[a.id]) {
                            articleMap[a.id] = normalizeFromData(a, item.date);
                        }
                    });
                });
                finishLoad();
            });
        }).catch(function() {
            container.innerHTML = '<div class="no-results">\u6682\u65E0\u5F52\u6863\u6570\u636E</div>';
        });
    }

    function finishLoad() {
        allArticles = Object.keys(articleMap).map(function(k) { return articleMap[k]; });
        // Sort by date descending
        allArticles.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

        document.getElementById('hero-stats').textContent =
            '\u5171 ' + allArticles.length + ' \u7BC7\u6587\u7AE0';

        applyFilters();
    }

    loadData();
})();
    </script>
</body>
</html>
