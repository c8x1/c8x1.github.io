<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Research | c8x1</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
        }
        [data-theme="light"] {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; }
        a { text-decoration: none; color: inherit; }

        /* Header */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: var(--text); }
        .logo span { color: var(--accent-blue); font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .nav-link { font-size: 0.9rem; color: var(--text-muted); transition: color .2s; }
        .nav-link:hover { color: var(--accent-blue); }
        .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all .2s; }
        .theme-toggle:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* Hero */
        .hero { text-align: center; padding: 3rem 0 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .hero h1 { font-size: 2rem; font-weight: 500; margin-bottom: 0.5rem; }
        .hero h1 .accent { color: var(--accent-purple); }
        .hero-sub { font-size: 0.95rem; color: var(--text-muted); }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .search-box {
            flex: 1; min-width: 200px; max-width: 400px;
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.55rem 1rem; color: var(--text); font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif; outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--accent-purple); }
        .search-box::placeholder { color: var(--text-muted); }
        .tag-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .tag-btn {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
            padding: 0.3rem 0.85rem; font-size: 0.78rem; color: var(--text-secondary);
            cursor: pointer; font-family: 'Noto Sans SC', sans-serif; white-space: nowrap;
            transition: all 0.2s;
        }
        .tag-btn:hover { border-color: var(--accent-purple); color: var(--text); }
        .tag-btn.active { background: var(--accent-purple); border-color: var(--accent-purple); color: #fff !important; }
        .result-count { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }

        /* Cards */
        .research-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
        }
        .research-card {
            background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent-purple);
            border-radius: 10px; padding: 1.5rem; display: flex; align-items: flex-start; gap: 1rem;
            transition: border-color .2s, transform .2s; cursor: pointer; color: inherit; text-decoration: none;
        }
        .research-card:hover { border-color: var(--accent-purple); transform: translateY(-2px); }
        .research-icon { flex-shrink: 0; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; background: rgba(139,92,246,0.1); }
        .research-info { flex: 1; min-width: 0; }
        .research-title { font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.4rem; }
        .research-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.75rem; }
        .research-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .research-tag { display: inline-block; font-size: 0.7rem; color: var(--accent-purple); border: 1px solid rgba(139,92,246,0.3); padding: 0.1rem 0.5rem; border-radius: 4px; margin-right: 0.2rem; }
        .research-date { font-size: 0.75rem; color: var(--text-muted); }
        .no-results { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.95rem; }

        /* Footer */
        footer { background: var(--card-bg); border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; margin-top: 4rem; }
        footer p { font-size: 0.9rem; color: var(--text-muted); }

        /* Responsive */
        @media (min-width: 768px) and (max-width: 1023px) {
            .research-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 767px) {
            .container { padding: 0 1rem; }
            .hero h1 { font-size: 1.4rem; }
            .research-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: none; }
            .result-count { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">c8x1<span> &middot; Daily Curated</span></a>
                <div class="header-right">
                    <a href="index.html" class="nav-link">首页</a>
                    <a href="archive.html" class="nav-link">归档</a>
                    <div id="current-date" style="font-size:0.9rem;color:var(--text-secondary)"></div>
                    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题"><i class="fas fa-moon" id="theme-icon"></i></button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="hero">
                <h1><span class="accent">Deep Research</span></h1>
                <p class="hero-sub">音频与语音技术深度调研报告</p>
            </div>
            <div class="toolbar" id="toolbar">
                <input type="text" class="search-box" id="search-box" placeholder="搜索报告标题、描述...">
                <div class="tag-filters" id="tag-filters"></div>
                <span class="result-count" id="result-count"></span>
            </div>
            <div class="research-grid" id="research-grid"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 c8x1 &middot; Deep Research &middot; Powered by GitHub Pages</p>
        </div>
    </footer>

    <script>
/* Theme Toggle */
(function(){
    var stored=localStorage.getItem('theme'),prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    var isDark=stored?stored==='dark':prefersDark,html=document.documentElement,icon=document.getElementById('theme-icon');
    function apply(d){if(d){html.removeAttribute('data-theme');icon.className='fas fa-moon'}else{html.setAttribute('data-theme','light');icon.className='fas fa-sun'}}
    apply(isDark);
    document.getElementById('theme-toggle').onclick=function(){isDark=!isDark;localStorage.setItem('theme',isDark?'dark':'light');apply(isDark)};
})();

/* Date */
document.getElementById('current-date').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

var allReports=[];
var activeTag=null;
var searchQuery='';

function getAllTags(reports){
    var tags={};
    reports.forEach(function(r){(r.tags||[]).forEach(function(t){tags[t]=(tags[t]||0)+1})});
    return Object.entries(tags).sort(function(a,b){return b[1]-a[1]}).map(function(e){return e[0]});
}

function getFiltered(){
    var filtered=allReports;
    if(activeTag){
        filtered=filtered.filter(function(r){return(r.tags||[]).indexOf(activeTag)!==-1});
    }
    if(searchQuery){
        var q=searchQuery.toLowerCase();
        filtered=filtered.filter(function(r){
            return(r.title||'').toLowerCase().indexOf(q)!==-1||(r.description||'').toLowerCase().indexOf(q)!==-1||(r.tags||[]).join(' ').toLowerCase().indexOf(q)!==-1;
        });
    }
    return filtered;
}

function renderCard(r){
    var card=document.createElement('a');
    card.className='research-card';
    card.href=r.file;
    var tags=(r.tags||[]).slice(0,4).map(function(t){return'<span class="research-tag">'+esc(t)+'</span>'}).join('');
    card.innerHTML='<div class="research-icon">'+(r.icon||'📄')+'</div><div class="research-info"><div class="research-title">'+esc(r.title)+'</div><div class="research-desc">'+esc(r.description)+'</div><div class="research-meta">'+tags+'<span class="research-date">'+esc(r.date)+'</span></div></div>';
    return card;
}

function render(){
    var filtered=getFiltered();
    var grid=document.getElementById('research-grid');
    grid.innerHTML='';
    document.getElementById('result-count').textContent=filtered.length+' / '+allReports.length+' 篇';
    if(!filtered.length){
        grid.innerHTML='<div class="no-results">没有匹配的报告</div>';
        return;
    }
    filtered.forEach(function(r){grid.appendChild(renderCard(r))});
}

function init(reports){
    allReports=reports;
    var tags=getAllTags(reports);
    var container=document.getElementById('tag-filters');
    var allBtn=document.createElement('button');
    allBtn.className='tag-btn active';
    allBtn.textContent='全部';
    allBtn.addEventListener('click',function(){
        activeTag=null;
        document.querySelectorAll('.tag-btn').forEach(function(b){b.classList.remove('active')});
        allBtn.classList.add('active');
        render();
    });
    container.appendChild(allBtn);
    tags.forEach(function(tag){
        var btn=document.createElement('button');
        btn.className='tag-btn';
        btn.textContent=tag;
        btn.addEventListener('click',function(){
            activeTag=tag;
            document.querySelectorAll('.tag-btn').forEach(function(b){b.classList.remove('active')});
            btn.classList.add('active');
            render();
        });
        container.appendChild(btn);
    });
    document.getElementById('search-box').addEventListener('input',function(e){
        searchQuery=e.target.value.trim();
        render();
    });
    render();
}

fetch('research-index.json?ts='+Date.now(), {cache:'no-store'}).then(function(r){return r.json()}).then(init).catch(function(){
    document.getElementById('research-grid').innerHTML='<div class="no-results">加载失败</div>';
});
    </script>
</body>
</html>
