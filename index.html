pan class="text-blue-600">精选</span></a><div class="flex items-center gap-4"><button id="search-toggle" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center transition-colors" title="搜索文章"><i class="fas fa-search text-gray-600 dark:text-gray-400"></i></button><button class="theme-toggle w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center transition-colors" title="切换主题"><i class="fas fa-moon text-gray-600 dark:text-gray-400 icon-moon"></i><i class="fas fa-sun text-yellow-500 icon-sun hidden"></i></button></div></div></nav><div id="search-panel" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm"><div class="max-w-2xl mx-auto mt-20 px-4"><div class="bg-white dark:bg-[#1a1a2e] rounded-xl shadow-2xl overflow-hidden"><div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3"><i class="fas fa-search text-gray-400"></i><input type="text" id="search-input" class="flex-1 bg-transparent border-none outline-none text-gray-800 dark:text-gray-200 placeholder-gray-400" placeholder="搜索文章标题、标签、分类..." autocomplete="off"><button id="search-close" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"><i class="fas fa-times"></i></button></div><div id="search-results" class="max-h-96 overflow-y-auto p-2"></div></div></div></div><header class="bg-gradient-to-br from-blue-600 to-indigo-800 text-white py-12"><div class="max-w-4xl mx-auto px-4 text-center"><h1 class="font-serif text-3xl md:text-4xl font-bold mb-3">每日精选</h1><p class="text-blue-100 text-lg">高质量英文长文翻译 · 每天1-2篇</p><div class="mt-6 flex flex-wrap justify-center gap-2"><span class="px-3 py-1 bg-white/20 rounded-full text-sm">哲学</span><span class="px-3 py-1 bg-white/20 rounded-full text-sm">科技</span><span class="px-3 py-1 bg-white/20 rounded-full text-sm">商业</span><span class="px-3 py-1 bg-white/20 rounded-full text-sm">文化</span></div></div></header><main class="flex-1 max-w-4xl mx-auto w-full px-4 py-10"><div id="loading" class="text-center py-12"><div class="inline-block w-10 h-10 border-3 border-gray-200 border-t-blue-600 rounded-full animate-spin mb-4"></div><p class="text-gray-500">加载文章中...</p></div><div id="error" class="hidden text-center py-12 text-red-600"><i class="fas fa-exclamation-circle text-3xl mb-3"></i><p>加载失败，请刷新页面重试</p></div><div id="article-list" class="hidden space-y-6"></div></main><footer class="bg-gray-100 dark:bg-[#16213e] border-t border-gray-200 dark:border-gray-800 py-8"><div class="max-w-4xl mx-auto px-4 text-center"><p class="text-sm text-gray-500 dark:text-gray-400"> &copy; 2025 Noc's Blog · 每日精选 </p><div class="mt-3 flex justify-center gap-4"><a href="https://github.com/c8x1/c8x1.github.io" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"><i class="fab fa-github"></i></a></div></div></footer><div id="aplayer"></div><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css"><script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script><script src="/assets/js/main.js"></script><script> (function() { 'use strict'; // ============================================ // 标签颜色配置 // ============================================ const TAG_COLORS = { '哲学': 'blue', '人工智能': 'blue', '商业战略': 'blue', '创业': 'green', '商业': 'green', '文化': 'orange', '美好生活': 'orange', '女性主义': 'pink', '中东政治': 'pink', '阅读清单': 'purple', '文化批评': 'purple', '社会学': 'blue', '经济学': 'blue', '政治学': 'green', '书评': 'green', '科技': 'blue' }; // ============================================ // 数据获取 // ============================================ async function loadArticles() { try { const response = await fetch('./articles.json'); if (!response.ok) throw new Error('Failed to load'); const data = await response.json(); renderArticles(data); initSearch(data.articles); } catch (error) { console.error('Error loading articles:', error); document.getElementById('loading').classList.add('hidden'); document.getElementById('error').classList.remove('hidden'); } } // ============================================ // 按日期分组 // ============================================ function groupByDate(articles) { const groups = {}; articles.forEach(article => { const date = article.date || '未知日期'; if (!groups[date]) { groups[date] = []; } groups[date].push(article); }); // 按日期倒序 return Object.keys(groups) .sort((a, b) => new Date(b) - new Date(a)) .map(date => ({ date, articles: groups[date] })); } // ============================================ // 格式化日期 // ============================================ function formatDate(dateStr) { try { const date = new Date(dateStr); return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`; } catch { return dateStr; } } // ============================================ // 渲染标签 // ============================================ function renderTags(categories) { if (!categories || !categories.length) return ''; return categories.map(cat => { const color = TAG_COLORS[cat] || 'gray'; const colorClasses = { blue: 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300', green: 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300', orange: 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300', purple: 'bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300', pink: 'bg-pink-100 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300', gray: 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300' }; return `\u003cspan class="px-2 py-0.5 text-xs font-medium rounded ${colorClasses[color]}"\u003e${cat}\u003c/span\u003e`; }).join(''); } // ============================================ // 渲染文章列表 // ============================================ function renderArticles(data) { const container = document.getElementById('article-list'); const groups = groupByDate(data.articles); if (groups.length === 0) { container.innerHTML = '\u003cp class="text-center text-gray-500 py-12"\u003e暂无文章\u003c/p\u003e'; } else { container.innerHTML = groups.map(group => ` \u003cdiv class="bg-white dark:bg-[#1a1a2e] rounded-xl shadow-sm border border-gray-200 dark:border-gray-800 overflow-hidden"\u003e \u003cdiv class="px-5 py-3 bg-gray-50 dark:bg-[#16213e] border-b border-gray-200 dark:border-gray-800 text-sm text-gray-500 dark:text-gray-400 font-medium"\u003e ${formatDate(group.date)} \u003c/div\u003e \u003cdiv class="divide-y divide-gray-100 dark:divide-gray-800"\u003e ${group.articles.map(article => ` \u003carticle class="p-5 hover:bg-gray-50 dark:hover:bg-[#252542] transition-colors"\u003e \u003cdiv class="flex flex-col sm:flex-row sm:items-start justify-between gap-4"\u003e \u003cdiv class="flex-1 min-w-0"\u003e \u003cdiv class="flex flex-wrap gap-2 mb-2"\u003e ${renderTags(article.category)} \u003c/div\u003e \u003ch2 class="font-serif text-lg font-semibold text-gray-900 dark:text-white mb-1"\u003e \u003ca href="/${article.file}" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors"\u003e ${escapeHtml(article.title)} \u003c/a\u003e \u003c/h2\u003e ${article.subtitle ? `\u003cp class="text-sm text-gray-500 dark:text-gray-400 italic mb-2"\u003e${escapeHtml(article.subtitle)}\u003c/p\u003e` : ''} \u003cp class="text-sm text-gray-500 dark:text-gray-400"\u003e ${escapeHtml(article.author || '未知作者')} · ${escapeHtml(article.source || '未知来源')} \u003c/p\u003e ${article.summary ? `\u003cp class="text-sm text-gray-600 dark:text-gray-400 mt-2 line-clamp-2"\u003e${escapeHtml(article.summary)}\u003c/p\u003e` : ''} \u003c/div\u003e \u003ca href="/${article.file}" class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors whitespace-nowrap"> 阅读 \u003c/a\u003e \u003c/div\u003e \u003c/article\u003e `).join('')} \u003c/div\u003e \u003c/div\u003e `).join(''); } document.getElementById('loading').classList.add('hidden'); container.classList.remove('hidden'); } // ============================================ // HTML 转义 // ============================================ function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; } // ============================================ // 搜索功能 // ============================================ function initSearch(articles) { const searchToggle = document.getElementById('search-toggle'); const searchPanel = document.getElementById('search-panel'); const searchClose = document.getElementById('search-close'); const searchInput = document.getElementById('search-input'); const searchResults = document.getElementById('search-results'); function openSearch() { searchPanel.classList.remove('hidden'); searchInput.focus(); document.body.style.overflow = 'hidden'; } function closeSearch() { searchPanel.classList.add('hidden'); searchInput.value = ''; searchResults.innerHTML = ''; document.body.style.overflow = ''; } searchToggle?.addEventListener('click', openSearch); searchClose?.addEventListener('click', closeSearch); searchPanel?.addEventListener('click', (e) => { if (e.target === searchPanel) closeSearch(); }); // ESC 关闭 document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); }); // 搜索逻辑 let debounceTimer; searchInput?.addEventListener('input', (e) => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => { const query = e.target.value.trim().toLowerCase(); if (query.length < 2) { searchResults.innerHTML = '\u003cp class="text-center text-gray-400 py-8"\u003e输入关键词开始搜索...\u003c/p\u003e'; return; } const results = articles.filter(article => { const text = `${article.title} ${article.subtitle || ''} ${article.summary || ''} ${(article.tags || []).join(' ')} ${(article.category || []).join(' ')}`.toLowerCase(); return text.includes(query); }); if (results.length === 0) { searchResults.innerHTML = '\u003cp class="text-center text-gray-400 py-8"\u003e未找到相关文章\u003c/p\u003e'; } else { searchResults.innerHTML = results.map(article => ` \u003ca href="/${article.file}" class="block p-3 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors"> \u003cdiv class="flex items-center gap-2 mb-1"\u003e ${renderTags(article.category)} \u003c/div\u003e \u003ch3 class="font-medium text-gray-900 dark:text-white"\u003e${escapeHtml(article.title)}\u003c/h3\u003e \u003cp class="text-sm text-gray-500 dark:text-gray-400 mt-1"\u003e${escapeHtml(article.author || '未知作者')} · ${formatDate(article.date)}\u003c/p\u003e \u003c/a\u003e `).join(''); } }, 150); }); } // ============================================ // 初始化 // ============================================ loadArticles(); })(); </script></body></html>
