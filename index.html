<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="每日精选高质量英文文章，翻译为中文。涵盖哲学、科技、商业、文化等领域。">
    <title>每日精选 | Daily Curated</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Noto Serif SC', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="./assets/css/main.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <meta property="og:title" content="每日精选 | Daily Curated">
    <meta property="og:description" content="高质量英文长文翻译，每天精选1-2篇">
    <meta property="og:type" content="website">
</head>
<body class="bg-gray-50 dark:bg-[#0f0f23] text-gray-800 dark:text-gray-200 min-h-screen flex flex-col">
    <nav class="bg-white dark:bg-[#1a1a2e] border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50 backdrop-blur-md bg-opacity-90 dark:bg-opacity-90">
        <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/" class="font-serif text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <span>每日</span><span class="text-blue-600">精选</span>
            </a>
            <div class="flex items-center gap-4">
                <button id="search-toggle" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center transition-colors" title="搜索文章">
                    <i class="fas fa-search text-gray-600 dark:text-gray-400"></i>
                </button>
                <button class="theme-toggle w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center justify-center transition-colors" title="切换主题">
                    <i class="fas fa-moon text-gray-600 dark:text-gray-400 icon-moon"></i>
                    <i class="fas fa-sun text-yellow-500 icon-sun hidden"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <div id="search-panel" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm">
        <div class="max-w-2xl mx-auto mt-20 px-4">
            <div class="bg-white dark:bg-[#1a1a2e] rounded-xl shadow-2xl overflow-hidden">
                <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
                    <i class="fas fa-search text-gray-400"></i>
                    <input type="text" id="search-input" class="flex-1 bg-transparent border-none outline-none text-gray-800 dark:text-gray-200 placeholder-gray-400" placeholder="搜索文章标题、标签、分类..." autocomplete="off">
                    <button id="search-close" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"><i class="fas fa-times"></i></button>
                </div>
                <div id="search-results" class="max-h-96 overflow-y-auto p-2"></div>
            </div>
        </div>
    </div>

    <header class="bg-gradient-to-br from-blue-600 to-indigo-800 text-white py-12">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="font-serif text-3xl md:text-4xl font-bold mb-3">每日精选</h1>
            <p class="text-blue-100 text-lg">高质量英文长文翻译 · 每天1-2篇</p>
            <div class="mt-6 flex flex-wrap justify-center gap-2">
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm">哲学</span>
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm">科技</span>
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm">商业</span>
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm">文化</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-10">
        
        <div id="filter-bar" class="flex items-center gap-3 mb-8 hidden">
            <button id="filter-today" class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors">今日最新</button>
            <button id="filter-all" class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">查看全部</button>
            <span id="filter-count" class="text-sm text-gray-400 ml-1"></span>
        </div>
        <div id="loading" class="text-center py-12">
            <div class="inline-block w-10 h-10 border-3 border-gray-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <p class="text-gray-500">加载文章中...</p>
        </div>
        <div id="error" class="hidden text-center py-12 text-red-600">
            <i class="fas fa-exclamation-circle text-3xl mb-3"></i>
            <p>加载失败，请刷新页面重试</p>
        </div>
        <div id="article-list" class="hidden space-y-6"></div>
    </main>

    <footer class="bg-gray-100 dark:bg-[#16213e] border-t border-gray-200 dark:border-gray-800 py-8">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">&copy; 2025 Noc's Blog · 每日精选</p>
            <div class="mt-3 flex justify-center gap-4">
                <a href="https://github.com/c8x1/c8x1.github.io" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <div id="aplayer"></div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    <script src="./assets/js/main.js"></script>
    <script>
    (function() {
        'use strict';
        const TAG_COLORS = {
            '哲学': 'blue', '人工智能': 'blue', '商业战略': 'blue',
            '创业': 'green', '商业': 'green',
            '文化': 'orange', '美好生活': 'orange',
            '女性主义': 'pink', '中东政治': 'pink',
            '阅读清单': 'purple', '文化批评': 'purple',
            '社会学': 'blue', '经济学': 'blue', '政治学': 'green',
            '书评': 'green', '科技': 'blue'
        };

        async function loadArticles() {
            try {
                const response = await fetch('https://cdn.jsdelivr.net/gh/c8x1/c8x1.github.io@master/articles.json');
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                renderArticles(data);
                document.getElementById('filter-bar').classList.remove('hidden');
                
                document.getElementById('filter-today').addEventListener('click', function(){ applyFilter('today'); });
                document.getElementById('filter-all').addEventListener('click', function(){ applyFilter('all'); });
initSearch(data.articles);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function groupByDate(articles) {
            const groups = {};
            articles.forEach(article => {
                const date = article.date || '未知日期';
                if (!groups[date]) groups[date] = [];
                groups[date].push(article);
            });
            return Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).map(date => ({ date, articles: groups[date] }));
        }

        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                return date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日';
            } catch { return dateStr; }
        }

        function renderTags(categories) {
            if (!categories || !categories.length) return '';
            return categories.map(cat => {
                const color = TAG_COLORS[cat] || 'gray';
                const classes = {
                    blue: 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300',
                    green: 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300',
                    orange: 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300',
                    purple: 'bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300',
                    pink: 'bg-pink-100 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300',
                    gray: 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300'
                };
                return '<span class="px-2 py-0.5 text-xs font-medium rounded ' + classes[color] + '">' + cat + '</span>';
            }).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function renderArticles(data) {
            let allArticles = [];
let todayDate = '';

function getTodayStr() {
    const now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}

function renderArticles(data, forceMode) {
    allArticles = data.articles;
    todayDate = getTodayStr();
    applyFilter(forceMode || 'today');
}

function applyFilter(mode) {
    const container = document.getElementById('article-list');
    const filterTodayBtn = document.getElementById('filter-today');
    const filterAllBtn = document.getElementById('filter-all');
    const filterCount = document.getElementById('filter-count');

    let groups;
    if (mode === 'today') {
        const todayArticles = allArticles.filter(a => a.date === todayDate);
        groups = todayArticles.length > 0 ? [{ date: todayDate, articles: todayArticles }] : [];
        if (filterCount) filterCount.textContent = '（共 ' + todayArticles.length + ' 篇）';
    } else {
        groups = groupByDate(allArticles);
        if (filterCount) filterCount.textContent = '（共 ' + allArticles.length + ' 篇）';
    }

    if (filterTodayBtn && filterAllBtn) {
        if (mode === 'today') {
            filterTodayBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors';
            filterAllBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors';
        } else {
            filterTodayBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors';
            filterAllBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors';
        }
    }

    if (groups.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-12">今日暂无新文章</p>';
    } else {
        let html = '';
        groups.forEach(group => {
            html += '<div class="bg-white dark:bg-[#1a1a2e] rounded-xl shadow-sm border border-gray-200 dark:border-gray-800 overflow-hidden">';
            html += '<div class="px-5 py-3 bg-gray-50 dark:bg-[#16213e] border-b border-gray-200 dark:border-gray-800 text-sm text-gray-500 dark:text-gray-400 font-medium">' + formatDate(group.date) + '</div>';
            html += '<div class="divide-y divide-gray-100 dark:divide-gray-800">';
            group.articles.forEach(article => {
                const filePath = ((article.file || '#').replace(/^\.\.\//, ''));
                html += '<article class="p-5 hover:bg-gray-50 dark:hover:bg-[#252542] transition-colors">';
                html += '<div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">';
                html += '<div class="flex-1 min-w-0">';
                html += '<div class="flex flex-wrap gap-2 mb-2">' + renderTags(article.category) + '</div>';
                html += '<h2 class="font-serif text-lg font-semibold text-gray-900 dark:text-white mb-1">';
                html += '<a href="./' + filePath + '" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">' + escapeHtml(article.title) + '</a>';
                html += '</h2>';
                if (article.subtitle) html += '<p class="text-sm text-gray-500 dark:text-gray-400 italic mb-2">' + escapeHtml(article.subtitle) + '</p>';
                html += '<p class="text-sm text-gray-500 dark:text-gray-400">' + escapeHtml(article.author || '未知作者') + ' · ' + escapeHtml(article.source || '未知来源') + '</p>';
                if (article.summary) html += '<p class="text-sm text-gray-600 dark:text-gray-400 mt-2 line-clamp-2">' + escapeHtml(article.summary) + '</p>';
                html += '</div>';
                html += '<a href="./' + filePath + '" class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors whitespace-nowrap">阅读</a>';
                html += '</div></article>';
            });
            html += '</div></div>';
        });
        container.innerHTML = html;
    }
    document.getElementById('loading').classList.add('hidden');
    container.classList.remove('hidden');
}

        function initSearch(articles) {
            const searchToggle = document.getElementById('search-toggle');
            const searchPanel = document.getElementById('search-panel');
            const searchClose = document.getElementById('search-close');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            
            function openSearch() {
                searchPanel.classList.remove('hidden');
                searchInput.focus();
                document.body.style.overflow = 'hidden';
            }
            function closeSearch() {
                searchPanel.classList.add('hidden');
                searchInput.value = '';
                searchResults.innerHTML = '';
                document.body.style.overflow = '';
            }
            
            searchToggle?.addEventListener('click', openSearch);
            searchClose?.addEventListener('click', closeSearch);
            searchPanel?.addEventListener('click', (e) => { if (e.target === searchPanel) closeSearch(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); });
            
            let debounceTimer;
            searchInput?.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const query = e.target.value.trim().toLowerCase();
                    if (query.length < 2) {
                        searchResults.innerHTML = '<p class="text-center text-gray-400 py-8">输入关键词开始搜索...</p>';
                        return;
                    }
                    const results = articles.filter(article => {
                        const text = (article.title + ' ' + (article.subtitle || '') + ' ' + (article.summary || '') + ' ' + (article.tags || []).join(' ') + ' ' + (article.category || []).join(' ')).toLowerCase();
                        return text.includes(query);
                    });
                    if (results.length === 0) {
                        searchResults.innerHTML = '<p class="text-center text-gray-400 py-8">未找到相关文章</p>';
                    } else {
                        let html = '';
                        results.forEach(article => {
                            html += '<a href="./' + article.file + '" class="block p-3 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">';
                            html += '<div class="flex items-center gap-2 mb-1">' + renderTags(article.category) + '</div>';
                            html += '<h3 class="font-medium text-gray-900 dark:text-white">' + escapeHtml(article.title) + '</h3>';
                            html += '<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">' + escapeHtml(article.author || '未知作者') + ' · ' + formatDate(article.date) + '</p>';
                            html += '</a>';
                        });
                        searchResults.innerHTML = html;
                    }
                }, 150);
            });
        }

        loadArticles();
    })();
    </script>
</body>
</html>
